name: Terraform EC2 Pipeline

on:
  pull_request:   # Dev runs on PR
  push:
    branches: [main]   # Prod runs only when merged to main
  workflow_dispatch:   # optional manual trigger

jobs:
  terraform-dev:
    runs-on: ubuntu-latest
    environment: dev   # requires approval if you configure "dev" environment in repo settings
    permissions:
      id-token: write   # required for OIDC
      contents: read    # required for checkout
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::051404302525:role/Trust-policy-Dev
          aws-region: ap-southeast-2

      - name: Terraform Init (Dev)
        run: terraform init
        working-directory: Environments/Dev

      - name: Terraform Plan (Dev)
        run: terraform plan -input=false
        working-directory: Environments/Dev

      - name: Terraform Apply (Dev)
        run: terraform apply -auto-approve -input=false
        working-directory: Environments/Dev

  terraform-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # only on merge to main
    environment: prod   # requires approval if you configure "prod" environment in repo settings
    permissions:
      id-token: write   # required for OIDC
      contents: read    # required for checkout
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::051404302525:role/Trust-policy-for-Prod
          aws-region: ap-southeast-2

      - name: Terraform Init (Prod)
        run: terraform init
        working-directory: Environments/Prod

      - name: Terraform Plan (Prod)
        run: terraform plan -input=false
        working-directory: Environments/Prod

      - name: Terraform Apply (Prod)
        run: terraform apply -auto-approve -input=false
        working-directory: Environments/Prod
