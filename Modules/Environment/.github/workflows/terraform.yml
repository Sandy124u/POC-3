name: Terraform EC2 Pipeline

on:
  pull_request:   # Dev runs on PR
  push:
    branches: [main]   # Prod runs only when merged to main

jobs:
  terraform-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.5
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubTerraformRole
          aws-region: ap-southeast-2
      - name: Terraform Init (Dev)
        run: terraform init
        working-directory: environments/dev
      - name: Terraform Plan (Dev)
        run: terraform plan -input=false
        working-directory: environments/dev

  terraform-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # only on merge to main
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.5
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubTerraformRole
          aws-region: ap-southeast-2
      - name: Terraform Init (Prod)
        run: terraform init
        working-directory: environments/prod
      - name: Terraform Plan (Prod)
        run: terraform plan -input=false
        working-directory: environments/prod
      - name: Terraform Apply (Prod)
        run: terraform apply -auto-approve -input=false
        working-directory: environments/prod
